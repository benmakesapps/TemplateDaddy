name: TemplateDaddy

options:
  projectFormat: xcode16_0
  buildIndependentTargetsInParallel: true
  developmentRegion: en
  defaultConfig: Release

fileGroups:
  - project.yml
  - Makefile
  - scripts

packages:
  Navigation:
    path: Navigation
  Location:
    path: Location
  Weather:
    path: Weather

settings:
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      GCC_DYNAMIC_NO_PIC: NO
      GCC_OPTIMIZATION_LEVEL: "0"
      GCC_PREPROCESSOR_DEFINITIONS:
        - "DEBUG=1"
        - "$(inherited)"
      MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      ENABLE_NS_ASSERTIONS: NO
      MTL_ENABLE_DEBUG_INFO: NO
      SWIFT_COMPILATION_MODE: wholemodule
      VALIDATE_PRODUCT: YES

targets:
  TemplateDaddy:
    type: application
    platform: iOS
    deploymentTarget: "18.2"

    # syncedFolder = Xcode 16 PBXFileSystemSynchronizedRootGroup.
    # New Swift files added to TemplateDaddy/ are picked up automatically
    # without re-running xcodegen.
    sources:
      - path: Source
        type: syncedFolder

    dependencies:
      - package: Navigation
        product: Navigation
      - package: Location
        product: Location
      - package: Weather
        product: Weather

    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: GF898R7MZ6
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        # Path has a space, so inner quotes must be preserved
        DEVELOPMENT_ASSET_PATHS: "\"Source/Preview Content\""
        ENABLE_PREVIEWS: YES
        # Xcode's built-in dynamic plist generation — no Info.plist file in repo
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        PRODUCT_BUNDLE_IDENTIFIER: bk.TemplateDaddy
        PRODUCT_NAME: "$(TARGET_NAME)"
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"

    scheme:
      testTargets: []
      gatherCoverageData: false
      
  Tests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - Tests
    dependencies:
      - target: TemplateDaddy
    scheme:
      gatherCoverageData: true
      testTargets:
        - name: Tests
          parallelizable: true
          randomExecutionOrder: true
